
<canvas id="gameCanvas" style="display:block;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);cursor:none;width:100%;max-width:700px;image-rendering:pixelated;"></canvas>
<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
  <span style="font-size:13px;color:var(--color-text-secondary);">Di chuyển:</span>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">A / ←</kbd>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">D / →</kbd>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">W / ↑ / Space</kbd>
  <span style="font-size:13px;color:var(--color-text-secondary);margin-left:8px;">= Nhảy</span>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 700;
canvas.height = 400;

const WORLD_W = 3000;
const WORLD_H = 800;
const TILE = 32;

function genTerrain() {
  const cols = Math.ceil(WORLD_W / TILE) + 2;
  let heights = [];
  let h = 500;
  for (let i = 0; i < cols; i++) {
    h += (Math.random() - 0.5) * 40;
    h = Math.max(300, Math.min(680, h));
    heights.push(h);
  }
  return heights;
}

const terrainHeights = genTerrain();

function getTerrainY(worldX) {
  const col = worldX / TILE;
  const c0 = Math.floor(col);
  const c1 = c0 + 1;
  const t = col - c0;
  const h0 = terrainHeights[Math.max(0, Math.min(c0, terrainHeights.length - 1))];
  const h1 = terrainHeights[Math.max(0, Math.min(c1, terrainHeights.length - 1))];
  return h0 + (h1 - h0) * t;
}

const PLATFORMS = [];
for (let i = 0; i < 20; i++) {
  const x = 300 + i * 140 + Math.random() * 60;
  const ty = getTerrainY(x);
  const y = ty - 80 - Math.random() * 120;
  PLATFORMS.push({ x, y, w: 80 + Math.random() * 60, h: 16 });
}

const COINS = [];
for (let i = 0; i < 40; i++) {
  const x = 200 + Math.random() * (WORLD_W - 400);
  const ty = getTerrainY(x);
  COINS.push({ x, y: ty - 50 - Math.random() * 100, collected: false, bobOffset: Math.random() * Math.PI * 2 });
}

const player = {
  x: 200, y: 400,
  vx: 0, vy: 0,
  w: 24, h: 36,
  onGround: false,
  facing: 1,
  score: 0,
  walkFrame: 0,
  walkTimer: 0
};

const camera = {
  x: 0, y: 0,
  targetX: 0, targetY: 0
};

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let particles = [];
function spawnCoinParticles(wx, wy) {
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 * i) / 8;
    particles.push({ x: wx, y: wy, vx: Math.cos(a) * 2, vy: Math.sin(a) * 2 - 1, life: 1, color: '#f5c842' });
  }
}

let time = 0;

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#1a1a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0f3460');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  const stars = [
    [50,30],[120,60],[200,20],[300,50],[400,15],[500,40],[600,25],[650,70],
    [80,90],[180,110],[350,80],[480,100],[580,60],[30,120],[250,130],[420,120],
    [520,145],[680,90],[140,150],[620,140]
  ];
  stars.forEach(([sx,sy]) => {
    const blink = 0.5 + 0.5 * Math.sin(time * 2 + sx);
    ctx.globalAlpha = blink * 0.7 + 0.3;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawTerrain(camX, camY) {
  ctx.save();
  ctx.translate(-camX, -camY);

  ctx.beginPath();
  ctx.moveTo(0, WORLD_H);
  for (let wx = 0; wx <= WORLD_W; wx += TILE / 4) {
    ctx.lineTo(wx, getTerrainY(wx));
  }
  ctx.lineTo(WORLD_W, WORLD_H);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, 400, 0, WORLD_H);
  grad.addColorStop(0, '#2d5a1b');
  grad.addColorStop(0.1, '#3a7d24');
  grad.addColorStop(0.3, '#5c3d1e');
  grad.addColorStop(1, '#3a2510');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.strokeStyle = '#4a9e2f';
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let wx = 0; wx <= WORLD_W; wx += TILE / 4) {
    if (wx === 0) ctx.moveTo(wx, getTerrainY(wx));
    else ctx.lineTo(wx, getTerrainY(wx));
  }
  ctx.stroke();

  for (let i = 0; i < PLATFORMS.length; i++) {
    const p = PLATFORMS[i];
    ctx.fillStyle = '#5a3d1e';
    ctx.fillRect(p.x, p.y, p.w, p.h + 6);
    ctx.fillStyle = '#7ec850';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#9ed870';
    ctx.fillRect(p.x + 2, p.y + 2, p.w - 4, 4);
  }

  ctx.restore();
}

function drawCoins(camX, camY) {
  ctx.save();
  ctx.translate(-camX, -camY);
  COINS.forEach(c => {
    if (c.collected) return;
    const bob = Math.sin(time * 3 + c.bobOffset) * 5;
    ctx.save();
    ctx.translate(c.x, c.y + bob);
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#f5c842';
    ctx.fill();
    ctx.strokeStyle = '#c89a10';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff8c0';
    ctx.beginPath();
    ctx.arc(-3, -3, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  ctx.restore();
}

function drawParticles(camX, camY) {
  ctx.save();
  ctx.translate(-camX, -camY);
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4 * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPlayer(camX, camY) {
  ctx.save();
  ctx.translate(player.x - camX, player.y - camY);
  ctx.scale(player.facing, 1);

  const legSwing = player.onGround ? Math.sin(player.walkFrame * 0.5) * 8 : 0;

  ctx.fillStyle = '#2c2c8a';
  ctx.fillRect(-8, 14, 8, 20);
  ctx.fillRect(0, 14, 8, 20);

  ctx.fillStyle = '#1a5e1a';
  ctx.fillRect(-10, -2, 20, 18);

  ctx.fillStyle = '#f5c07a';
  ctx.beginPath();
  ctx.arc(0, -10, 10, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#1a1a6a';
  ctx.beginPath();
  ctx.arc(-3, -11, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(3, -11, 2, 0, Math.PI * 2);
  ctx.fill();

  if (player.onGround && (keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight'])) {
    ctx.fillStyle = '#e8a050';
    ctx.fillRect(-12, 5, 8, 6);
    ctx.fillRect(4, 5, 8, 6);
  }

  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(10, 10, 160, 44, 8);
  ctx.fill();
  ctx.fillStyle = '#f5c842';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('⭐ Điểm: ' + player.score, 22, 32);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '11px monospace';
  ctx.fillText('X: ' + Math.round(player.x), 22, 48);
}

function update() {
  time += 0.016;

  const speed = 3.5;
  const jump = -12;
  const gravity = 0.5;

  if (keys['KeyA'] || keys['ArrowLeft']) { player.vx = -speed; player.facing = -1; }
  else if (keys['KeyD'] || keys['ArrowRight']) { player.vx = speed; player.facing = 1; }
  else player.vx *= 0.8;

  if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.onGround) {
    player.vy = jump;
    player.onGround = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  if (player.vx !== 0 && player.onGround) {
    player.walkTimer++;
    if (player.walkTimer > 3) { player.walkFrame++; player.walkTimer = 0; }
  }

  player.x = Math.max(10, Math.min(WORLD_W - 10, player.x));

  const groundY = getTerrainY(player.x);
  if (player.y + player.h / 2 >= groundY) {
    player.y = groundY - player.h / 2;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  for (let p of PLATFORMS) {
    const px = player.x, py = player.y + player.h / 2;
    const prevPy = py - player.vy;
    if (px > p.x && px < p.x + p.w && prevPy <= p.y + 2 && py >= p.y && player.vy > 0) {
      player.y = p.y - player.h / 2;
      player.vy = 0;
      player.onGround = true;
    }
  }

  if (player.y > WORLD_H + 100) {
    player.y = 300;
    player.x = 200;
    player.vy = 0;
  }

  COINS.forEach(c => {
    if (c.collected) return;
    const bob = Math.sin(time * 3 + c.bobOffset) * 5;
    const dx = player.x - c.x;
    const dy = (player.y) - (c.y + bob);
    if (Math.sqrt(dx * dx + dy * dy) < 22) {
      c.collected = true;
      player.score += 10;
      spawnCoinParticles(c.x, c.y + bob);
    }
  });

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
  });
  particles = particles.filter(p => p.life > 0);

  const targetCamX = player.x - canvas.width / 2;
  const targetCamY = player.y - canvas.height * 0.55;
  camera.x += (targetCamX - camera.x) * 0.1;
  camera.y += (targetCamY - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(WORLD_W - canvas.width, camera.x));
  camera.y = Math.max(0, Math.min(WORLD_H - canvas.height, camera.y));
}

function loop() {
  update();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawSky();
  drawTerrain(camera.x, camera.y);
  drawCoins(camera.x, camera.y);
  drawParticles(camera.x, camera.y);
  drawPlayer(camera.x, camera.y);
  drawHUD();
  requestAnimationFrame(loop);
}

canvas.addEventListener('click', () => canvas.focus());
canvas.setAttribute('tabindex', '0');
canvas.focus();

loop();
</script>
