
<canvas id="gc" style="display:block;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);cursor:none;width:100%;max-width:700px;image-rendering:pixelated;"></canvas>
<div style="margin-top:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
  <span style="font-size:13px;color:var(--color-text-secondary);">Di chuyển:</span>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">A / ←</kbd>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">D / →</kbd>
  <kbd style="font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);">W / ↑ / Space</kbd>
  <span style="font-size:13px;color:var(--color-text-secondary);">= Nhảy</span>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
canvas.width = 700;
canvas.height = 400;

const T = 32;

// =============================================
// MA TRAN DIA HINH 2 CHIEU (tilemap)
// 0 = khong khi, 1 = dat, 2 = co, 3 = da, 4 = dat sau, 5 = coin
// =============================================
const TILE_AIR   = 0;
const TILE_GRASS = 1;
const TILE_DIRT  = 2;
const TILE_STONE = 3;
const TILE_DEEP  = 4;
const TILE_COIN  = 5;
const TILE_PLATF = 6;

const MAP_COLS = 90;
const MAP_ROWS = 20;

// khoi tao ma tran rong
const tilemap = [];
for (let r = 0; r < MAP_ROWS; r++) {
  tilemap.push(new Array(MAP_COLS).fill(TILE_AIR));
}

// sinh dia hinh theo height map
const heightMap = [];
let h = 10;
for (let c = 0; c < MAP_COLS; c++) {
  h += (Math.random() - 0.5) * 1.8;
  h = Math.max(6, Math.min(14, h));
  heightMap.push(Math.round(h));
}

for (let c = 0; c < MAP_COLS; c++) {
  const top = heightMap[c];
  for (let r = 0; r < MAP_ROWS; r++) {
    if (r === top)          tilemap[r][c] = TILE_GRASS;
    else if (r === top + 1) tilemap[r][c] = TILE_DIRT;
    else if (r === top + 2) tilemap[r][c] = TILE_DIRT;
    else if (r > top + 2 && r < MAP_ROWS - 2) tilemap[r][c] = TILE_STONE;
    else if (r >= MAP_ROWS - 2) tilemap[r][c] = TILE_DEEP;
  }
}

// them platform ngau nhien
const platPositions = [
  [4,12],[8,10],[14,13],[20,9],[26,11],[32,8],[38,12],[44,10],
  [50,9],[56,13],[62,11],[68,8],[74,12],[80,10]
];
for (const [pc, pr] of platPositions) {
  const w = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < w; i++) {
    if (pc + i < MAP_COLS && tilemap[pr][pc + i] === TILE_AIR) {
      tilemap[pr][pc + i] = TILE_PLATF;
    }
  }
}

// them coin trong khong gian thoang
for (let i = 0; i < 35; i++) {
  const cc = 2 + Math.floor(Math.random() * (MAP_COLS - 4));
  const cr = heightMap[cc] - 2 - Math.floor(Math.random() * 3);
  if (cr >= 0 && tilemap[cr][cc] === TILE_AIR) {
    tilemap[cr][cc] = TILE_COIN;
  }
}

// coin tren platform
for (const [pc, pr] of platPositions) {
  if (pr - 1 >= 0 && tilemap[pr - 1][pc] === TILE_AIR) {
    tilemap[pr - 1][pc] = TILE_COIN;
  }
}

// mang theo doi coin da thu thap
const coinCollected = [];
for (let r = 0; r < MAP_ROWS; r++) coinCollected.push(new Array(MAP_COLS).fill(false));

function isSolid(r, c) {
  if (r < 0 || r >= MAP_ROWS || c < 0 || c >= MAP_COLS) return false;
  const t = tilemap[r][c];
  return t === TILE_GRASS || t === TILE_DIRT || t === TILE_STONE || t === TILE_DEEP || t === TILE_PLATF;
}

// mau sac tile
const TILE_COLORS = {
  [TILE_GRASS]: '#4a9e2f',
  [TILE_DIRT]:  '#7a4f28',
  [TILE_STONE]: '#6b6b6b',
  [TILE_DEEP]:  '#3a3a3a',
  [TILE_PLATF]: '#8B6914',
};
const TILE_TOP = {
  [TILE_GRASS]: '#6ecc44',
  [TILE_PLATF]: '#c8a040',
};
const TILE_SHADE = {
  [TILE_GRASS]: '#3a7d24',
  [TILE_DIRT]:  '#5c3d1e',
  [TILE_STONE]: '#505050',
  [TILE_DEEP]:  '#2a2a2a',
  [TILE_PLATF]: '#6a4e10',
};

function drawTilemap(camX, camY) {
  const startC = Math.max(0, Math.floor(camX / T));
  const endC   = Math.min(MAP_COLS - 1, Math.ceil((camX + canvas.width) / T));
  const startR = Math.max(0, Math.floor(camY / T));
  const endR   = Math.min(MAP_ROWS - 1, Math.ceil((camY + canvas.height) / T));

  for (let r = startR; r <= endR; r++) {
    for (let c = startC; c <= endC; c++) {
      const tile = tilemap[r][c];
      if (tile === TILE_AIR || tile === TILE_COIN) continue;

      const sx = c * T - camX;
      const sy = r * T - camY;

      ctx.fillStyle = TILE_COLORS[tile] || '#888';
      ctx.fillRect(sx, sy, T, T);

      // highlight top
      if (TILE_TOP[tile]) {
        ctx.fillStyle = TILE_TOP[tile];
        ctx.fillRect(sx, sy, T, 5);
      }
      // shade bottom-right
      ctx.fillStyle = TILE_SHADE[tile] || '#444';
      ctx.fillRect(sx, sy + T - 4, T, 4);
      ctx.fillRect(sx + T - 4, sy, 4, T);

      // duong luoi nhe
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(sx, sy, T, T);
    }
  }
}

function drawCoins(camX, camY, t) {
  const startC = Math.max(0, Math.floor(camX / T));
  const endC   = Math.min(MAP_COLS - 1, Math.ceil((camX + canvas.width) / T));
  const startR = Math.max(0, Math.floor(camY / T));
  const endR   = Math.min(MAP_ROWS - 1, Math.ceil((camY + canvas.height) / T));

  for (let r = startR; r <= endR; r++) {
    for (let c = startC; c <= endC; c++) {
      if (tilemap[r][c] !== TILE_COIN) continue;
      if (coinCollected[r][c]) continue;
      const sx = c * T - camX + T / 2;
      const sy = r * T - camY + T / 2 + Math.sin(t * 3 + c) * 4;
      ctx.beginPath();
      ctx.arc(sx, sy, 9, 0, Math.PI * 2);
      ctx.fillStyle = '#f5c842';
      ctx.fill();
      ctx.strokeStyle = '#c89a10';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#fff8c0';
      ctx.beginPath();
      ctx.arc(sx - 2, sy - 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// nhân vật
const player = {
  x: 3 * T, y: (heightMap[3] - 2) * T,
  vx: 0, vy: 0,
  w: 22, h: 30,
  onGround: false,
  facing: 1,
  score: 0,
  walkFrame: 0,
  walkTimer: 0
};

const camera = { x: 0, y: 0 };
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

let particles = [];
function spawnParticles(wx, wy) {
  for (let i = 0; i < 8; i++) {
    const a = (Math.PI * 2 * i) / 8;
    particles.push({ x: wx, y: wy, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5 - 1, life: 1 });
  }
}

function drawParticles(camX, camY) {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = '#f5c842';
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y - camY, 4 * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawPlayer(camX, camY) {
  const px = player.x - camX;
  const py = player.y - camY;
  ctx.save();
  ctx.translate(px + player.w / 2, py + player.h / 2);
  ctx.scale(player.facing, 1);
  const lx = player.onGround && (keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight'])
    ? Math.sin(player.walkFrame * 0.5) * 5 : 0;
  ctx.fillStyle = '#2c2c8a';
  ctx.fillRect(-8, 6, 7, 14);
  ctx.fillRect(1, 6, 7, 14);
  ctx.fillStyle = '#1a5e1a';
  ctx.fillRect(-9, -4, 18, 12);
  ctx.fillStyle = '#f5c07a';
  ctx.beginPath();
  ctx.arc(0, -11, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a6a';
  ctx.beginPath(); ctx.arc(-3, -12, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -12, 2, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function resolveCollision() {
  const STEPS = 3;
  player.x += player.vx;
  for (let s = 0; s < STEPS; s++) {
    const c0 = Math.floor(player.x / T);
    const c1 = Math.floor((player.x + player.w - 1) / T);
    const rMid = Math.floor((player.y + player.h / 2) / T);
    if (player.vx > 0) {
      if (isSolid(rMid, c1)) { player.x = c1 * T - player.w; player.vx = 0; }
    } else if (player.vx < 0) {
      if (isSolid(rMid, c0)) { player.x = (c0 + 1) * T; player.vx = 0; }
    }
  }

  player.y += player.vy;
  player.onGround = false;
  const c0 = Math.floor(player.x / T);
  const c1 = Math.floor((player.x + player.w - 1) / T);
  if (player.vy >= 0) {
    const rBot = Math.floor((player.y + player.h) / T);
    for (let c = c0; c <= c1; c++) {
      if (isSolid(rBot, c)) {
        player.y = rBot * T - player.h;
        player.vy = 0;
        player.onGround = true;
        break;
      }
    }
  } else {
    const rTop = Math.floor(player.y / T);
    for (let c = c0; c <= c1; c++) {
      if (isSolid(rTop, c)) {
        player.y = (rTop + 1) * T;
        player.vy = 0;
        break;
      }
    }
  }
}

function collectCoins() {
  const pCx = Math.floor((player.x + player.w / 2) / T);
  const pCy = Math.floor((player.y + player.h / 2) / T);
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = pCy + dr, c = pCx + dc;
      if (r < 0 || r >= MAP_ROWS || c < 0 || c >= MAP_COLS) continue;
      if (tilemap[r][c] === TILE_COIN && !coinCollected[r][c]) {
        const dx = (player.x + player.w / 2) - (c * T + T / 2);
        const dy = (player.y + player.h / 2) - (r * T + T / 2);
        if (Math.sqrt(dx * dx + dy * dy) < T) {
          coinCollected[r][c] = true;
          player.score += 10;
          spawnParticles(c * T + T / 2, r * T + T / 2);
        }
      }
    }
  }
}

function drawSky() {
  ctx.fillStyle = '#0f1b2d';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  const stars = [[50,20],[150,40],[280,15],[400,35],[530,10],[640,50],[80,80],[220,70],[360,60],[480,85],[600,30]];
  stars.forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.beginPath();
  ctx.roundRect(10, 10, 200, 48, 8);
  ctx.fill();
  ctx.fillStyle = '#f5c842';
  ctx.font = 'bold 13px monospace';
  ctx.fillText('Diem: ' + player.score, 22, 30);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '11px monospace';
  const col = Math.floor(player.x / T);
  const row = Math.floor(player.y / T);
  ctx.fillText('tile [' + row + '][' + col + ']  |  x:' + Math.round(player.x) + ' y:' + Math.round(player.y), 22, 50);
}

let time = 0;

function update() {
  time += 0.016;
  const spd = 3.2, jmp = -11, grv = 0.5;

  if (keys['KeyA'] || keys['ArrowLeft'])  { player.vx = -spd; player.facing = -1; }
  else if (keys['KeyD'] || keys['ArrowRight']) { player.vx = spd;  player.facing = 1; }
  else player.vx *= 0.75;

  if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.onGround) {
    player.vy = jmp;
    player.onGround = false;
  }

  player.vy = Math.min(player.vy + grv, 18);

  if (player.vx !== 0 && player.onGround) {
    player.walkTimer++;
    if (player.walkTimer > 3) { player.walkFrame++; player.walkTimer = 0; }
  }

  resolveCollision();
  collectCoins();

  player.x = Math.max(0, Math.min(MAP_COLS * T - player.w, player.x));
  if (player.y > MAP_ROWS * T + 50) {
    player.y = (heightMap[3] - 2) * T;
    player.x = 3 * T;
    player.vy = 0;
  }

  const targetX = player.x + player.w / 2 - canvas.width / 2;
  const targetY = player.y + player.h / 2 - canvas.height * 0.5;
  camera.x += (targetX - camera.x) * 0.1;
  camera.y += (targetY - camera.y) * 0.1;
  camera.x = Math.max(0, Math.min(MAP_COLS * T - canvas.width,  camera.x));
  camera.y = Math.max(0, Math.min(MAP_ROWS * T - canvas.height, camera.y));

  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.04; });
  particles = particles.filter(p => p.life > 0);
}

function loop() {
  update();
  drawSky();
  drawTilemap(camera.x, camera.y);
  drawCoins(camera.x, camera.y, time);
  drawParticles(camera.x, camera.y);
  drawPlayer(camera.x, camera.y);
  drawHUD();
  requestAnimationFrame(loop);
}

canvas.setAttribute('tabindex', '0');
canvas.addEventListener('click', () => canvas.focus());
canvas.focus();
loop();
</script>
